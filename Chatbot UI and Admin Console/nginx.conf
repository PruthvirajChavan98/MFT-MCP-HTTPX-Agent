# Volumetric abuse defense — granular per-user quotas handled by FastAPI
limit_req_zone $binary_remote_addr zone=api_per_ip:10m rate=30r/s;
limit_conn_zone $binary_remote_addr zone=api_conn_per_ip:10m;
limit_req_zone $binary_remote_addr zone=stream_new_per_ip:10m rate=5r/s;

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # ── Gzip ──────────────────────────────────────────────────────────────
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;
    gzip_min_length 256;
    gzip_vary on;

    # ── Security headers ──────────────────────────────────────────────────
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ── SSE streaming endpoint (before general /api/) ─────────────────────
    location /api/agent/stream {
        limit_req zone=stream_new_per_ip burst=10 nodelay;

        proxy_pass http://agent:8000/agent/stream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";

        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        chunked_transfer_encoding on;
    }

    # ── Reverse-proxy /api/ → backend (strip /api prefix) ────────────────
    location /api/ {
        limit_req zone=api_per_ip burst=60 nodelay;
        limit_conn api_conn_per_ip 50;

        proxy_pass http://agent:8000/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";

        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        chunked_transfer_encoding on;
    }

    # ── Hashed static assets — aggressive caching ─────────────────────────
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # ── SPA fallback — all other routes serve index.html ──────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }
}
