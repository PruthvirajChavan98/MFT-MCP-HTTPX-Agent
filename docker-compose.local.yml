# docker-compose.local.yml

name: mft-local

services:
  redis:
    image: redis/redis-stack-server:latest
    container_name: mft_redis_local
    restart: unless-stopped
    ports:
      - "127.0.0.1:${LOCAL_REDIS_PORT:-16379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 2s
      retries: 5
      start_period: 5s
    volumes:
      - redis_data_local:/data
    mem_limit: 512m
    cpus: 0.50
    networks:
      - mft_local

  postgres:
    image: postgres:16-alpine
    container_name: mft_postgres_local
    restart: unless-stopped
    ports:
      - "127.0.0.1:${LOCAL_POSTGRES_PORT:-15432}:5432"
    environment:
      POSTGRES_DB: "${POSTGRES_DB}"
      POSTGRES_USER: "${POSTGRES_USER}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD}"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 3s
      retries: 5
    volumes:
      - postgres_data_local:/var/lib/postgresql/data
      - ./backend/infra/sql/session_security.sql:/docker-entrypoint-initdb.d/01_session_security.sql:ro
    mem_limit: 1g
    cpus: 1.00
    networks:
      - mft_local

  neo4j:
    image: neo4j:5.26.0
    container_name: mft_neo4j_local
    restart: unless-stopped
    ports:
      - "127.0.0.1:${LOCAL_NEO4J_HTTP_PORT:-17474}:7474"
      - "127.0.0.1:${LOCAL_NEO4J_BOLT_PORT:-17687}:7687"
    environment:
      NEO4J_AUTH: "${NEO4J_USER}/${NEO4J_PASSWORD}"
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_security_procedures_unrestricted: apoc.*
      NEO4J_server_default__listen__address: 0.0.0.0
      NEO4J_server_bolt_advertised__address: neo4j:7687
      NEO4J_server_http_advertised__address: neo4j:7474
      NEO4J_server_memory_heap_initial__size: "${LOCAL_NEO4J_HEAP_INITIAL:-512m}"
      NEO4J_server_memory_heap_max__size: "${LOCAL_NEO4J_HEAP_MAX:-512m}"
      NEO4J_server_memory_pagecache_size: "${LOCAL_NEO4J_PAGECACHE:-512m}"
    volumes:
      - neo4j_data_local:/data
    mem_limit: 2g
    cpus: 2.00
    networks:
      - mft_local

  mcp:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: mft_mcp:local
    container_name: mft_mcp_local
    command: ["uv", "run", "python", "src/main_mcp.py"]
    restart: unless-stopped
    ports:
      - "127.0.0.1:${LOCAL_MCP_PORT:-18050}:8050"
    env_file:
      - ./backend/.env
    environment:
      PYTHONUNBUFFERED: "1"
      REDIS_URL: "redis://redis:6379/0"
    volumes:
      - ./backend:/app
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import socket; s=socket.create_connection(('127.0.0.1', 8050), 2); s.close()\"",
        ]
      interval: 10s
      timeout: 3s
      retries: 6
      start_period: 10s
    extra_hosts:
      - "host.docker.internal:host-gateway"
    mem_limit: 768m
    cpus: 1.00
    networks:
      - mft_local

  agent:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: mft_agent:local
    container_name: mft_agent_local
    command:
      [
        "uv",
        "run",
        "uvicorn",
        "src.main_agent:app",
        "--host",
        "0.0.0.0",
        "--port",
        "8000",
        "--reload",
      ]
    restart: unless-stopped
    ports:
      - "127.0.0.1:${LOCAL_AGENT_PORT:-18000}:8000"
    env_file:
      - ./backend/.env
    environment:
      PORT: "8000"
      PYTHONUNBUFFERED: "1"
      MCP_SERVER_URL: "http://mcp:8050/sse"

      REDIS_URL: "redis://redis:6379/0"
      REDIS_MAX_CONNECTIONS: "50"

      POSTGRES_DSN: "postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}"
      POSTGRES_POOL_MIN: "10"
      POSTGRES_POOL_MAX: "50"

      NEO4J_URI: "bolt://neo4j:7687"
      NEO4J_USER: "${NEO4J_USER}"
      NEO4J_PASSWORD: "${NEO4J_PASSWORD}"

      SHADOW_EVAL_ENABLED: "1"
      SHADOW_EVAL_SAMPLE_RATE: "0.1"
      SHADOW_EVAL_CAPTURE: "light"

      OPENROUTER_SITE_URL: "${OPENROUTER_SITE_URL}"
      OPENROUTER_APP_TITLE: "${OPENROUTER_APP_TITLE}"

      NBFC_ROUTER_ENABLED: "true"
      NBFC_ROUTER_MODE: "hybrid"
      NBFC_ROUTER_CHAT_MODEL: "z-ai/glm-4.7"
      NBFC_ROUTER_EMBED_MODEL: "openai/text-embedding-3-small"
      NBFC_ROUTER_CACHE_DIR: ".cache_nbfc_router"
      NBFC_ROUTER_ANSWERABILITY_ENABLED: "true"
      NBFC_ROUTER_ANSWERABILITY_KB_THRESHOLD: "0.58"
      NBFC_ROUTER_ANSWERABILITY_KB_HEURISTIC_THRESHOLD: "0.38"
      NBFC_ROUTER_ANSWERABILITY_MCP_THRESHOLD: "0.52"
      NBFC_ROUTER_ANSWERABILITY_MARGIN: "0.04"
      NBFC_ROUTER_ANSWERABILITY_MAX_TOOLS: "60"
      NBFC_ROUTER_ANSWERABILITY_VECTOR_CACHE_SIZE: "64"
      AGENT_INLINE_ROUTER_ENABLED: "false"
      AGENT_INLINE_ROUTER_EXPOSE: "false"
      AGENT_STREAM_EXPOSE_INTERNAL_EVENTS: "false"
      AGENT_STREAM_EXPOSE_REASONING: "true"

      SECURITY_ENABLED: "true"
      SECURITY_TRUST_PROXY_HEADERS: "true"
      SECURITY_PREFER_IP_HEADER: "x-forwarded-for"
      SECURITY_CRITICAL_PATHS: "/agent,/graphql,/eval"
      SECURITY_MONITORED_PATHS: "/health,/metrics"
      TOR_REFRESH_SECONDS: "1800"
      TOR_STALE_AFTER_SECONDS: "7200"
      TOR_NEGATIVE_CACHE_TTL_SECONDS: "300"
      TOR_NEGATIVE_CACHE_CLEANUP_INTERVAL: "1000"

      SECURITY_IMPOSSIBLE_TRAVEL_KMH: "900"
      SECURITY_CONCURRENT_IP_WINDOW_SECONDS: "300"
      SECURITY_CONCURRENT_IP_THRESHOLD: "3"
      SECURITY_RISK_IMPOSSIBLE_TRAVEL: "0.6"
      SECURITY_RISK_CONCURRENT_IP: "0.5"
      SECURITY_RISK_DEVICE_MISMATCH: "0.4"
      SECURITY_RISK_GEO_ANOMALY: "0.3"
      SECURITY_RISK_ALLOW_THRESHOLD: "0.4"
      SECURITY_RISK_STEP_UP_THRESHOLD: "0.7"

      PROMETHEUS_METRICS_ENABLED: "true"
      GEOIP_DB_PATH: "/app/data/geoip/GeoLite2-City.mmdb"
    volumes:
      - ./backend:/app
      - ./backend/data/geoip:/app/data/geoip
    depends_on:
      redis:
        condition: service_healthy
      mcp:
        condition: service_healthy
      neo4j:
        condition: service_started
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8000/health/ready >/dev/null"]
      interval: 15s
      timeout: 4s
      retries: 8
      start_period: 20s
    extra_hosts:
      - "host.docker.internal:host-gateway"
    mem_limit: 2g
    cpus: 2.00
    networks:
      - mft_local

  localsetup:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: mft_localsetup:local
    container_name: mft_localsetup
    command:
      [
        "/bin/bash",
        "/app/scripts/localsetup.sh",
      ]
    profiles: ["setup"]
    restart: "no"
    volumes:
      - ./backend:/app
    depends_on:
      redis:
        condition: service_started
      postgres:
        condition: service_started
      neo4j:
        condition: service_started
      mcp:
        condition: service_started
      agent:
        condition: service_started
    mem_limit: 256m
    cpus: 0.25
    networks:
      - mft_local

  router_worker:
    profiles: ["router"]
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: mft_router_worker:local
    container_name: mft_router_worker_local
    command: ["uv", "run", "python", "-m", "src.agent_service.router.worker"]
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      REDIS_URL: "redis://redis:6379/0"
      NEO4J_URI: "bolt://neo4j:7687"
      NEO4J_USER: "${NEO4J_USER}"
      NEO4J_PASSWORD: "${NEO4J_PASSWORD}"
    volumes:
      - ./backend:/app
    depends_on:
      redis:
        condition: service_healthy
      neo4j:
        condition: service_started
    mem_limit: 768m
    cpus: 1.00
    networks:
      - mft_local

  prometheus:
    profiles: ["monitoring"]
    image: prom/prometheus:v2.53.1
    container_name: mft_prometheus_local
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.enable-lifecycle"
    ports:
      - "127.0.0.1:${LOCAL_PROMETHEUS_PORT:-19090}:9090"
    volumes:
      - ./backend/infra/monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./backend/infra/monitoring/prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus_data_local:/prometheus
    depends_on:
      agent:
        condition: service_started
      alertmanager:
        condition: service_started
    restart: unless-stopped
    mem_limit: 512m
    cpus: 0.75
    networks:
      - mft_local

  alertmanager:
    profiles: ["monitoring"]
    image: prom/alertmanager:v0.28.0
    container_name: mft_alertmanager_local
    command:
      - "--config.file=/etc/alertmanager/alertmanager.yml"
    ports:
      - "127.0.0.1:${LOCAL_ALERTMANAGER_PORT:-19093}:9093"
    volumes:
      - ./backend/infra/monitoring/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
    restart: unless-stopped
    mem_limit: 256m
    cpus: 0.50
    networks:
      - mft_local

  grafana:
    profiles: ["monitoring"]
    image: grafana/grafana:11.1.4
    container_name: mft_grafana_local
    ports:
      - "127.0.0.1:${LOCAL_GRAFANA_PORT:-13000}:3000"
    environment:
      GF_SECURITY_ADMIN_USER: "${GRAFANA_ADMIN_USER}"
      GF_SECURITY_ADMIN_PASSWORD: "${GRAFANA_ADMIN_PASSWORD}"
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data_local:/var/lib/grafana
      - ./backend/infra/monitoring/grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ./backend/infra/monitoring/grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./backend/infra/monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      prometheus:
        condition: service_started
    restart: unless-stopped
    mem_limit: 512m
    cpus: 0.75
    networks:
      - mft_local

  geoip_updater:
    profiles: ["geoip"]
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: mft_geoip_updater:local
    container_name: mft_geoip_updater_local
    command: ["/bin/bash", "-lc", "while true; do /app/scripts/update_free_geoip.sh; sleep 86400; done"]
    environment:
      GEOIP_FREE_ONLY: "true"
      GEOIP_DATA_DIR: "/app/data/geoip"
      MAXMIND_ACCOUNT_ID: "${MAXMIND_ACCOUNT_ID}"
      MAXMIND_LICENSE_KEY: "${MAXMIND_LICENSE_KEY}"
      IP2PROXY_LITE_URL: "${IP2PROXY_LITE_URL}"
    volumes:
      - ./backend/data/geoip:/app/data/geoip
      - ./backend/scripts/update_free_geoip.sh:/app/scripts/update_free_geoip.sh:ro
    restart: unless-stopped
    mem_limit: 256m
    cpus: 0.25
    networks:
      - mft_local

  frontend:
    image: node:20-alpine
    container_name: mft_frontend_local
    working_dir: /app
    command: ["sh", "-lc", "npm install && npm run dev -- --host 0.0.0.0 --port 5173"]
    environment:
      VITE_API_PROXY_TARGET: "http://agent:8000"
      VITE_API_BASE_URL: "/api"
      CHOKIDAR_USEPOLLING: "true"
    volumes:
      - ./frontend:/app
      - frontend_node_modules_local:/app/node_modules
    ports:
      - "127.0.0.1:${LOCAL_FRONTEND_PORT:-15173}:5173"
    depends_on:
      agent:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:5173 >/dev/null"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s
    restart: unless-stopped
    mem_limit: 512m
    cpus: 1.00
    networks:
      - mft_local

  cloudflared:
    profiles: ["edge"]
    image: cloudflare/cloudflared:latest
    container_name: mft_cloudflared_local
    env_file:
      - ./backend/.env
    volumes:
      - ./cloudflared/config.yml:/etc/cloudflared/config.yml:ro
    command: ["tunnel", "--no-autoupdate", "run", "--token", "${TUNNEL_TOKEN}"]
    depends_on:
      - frontend
    restart: unless-stopped
    mem_limit: 256m
    cpus: 0.50
    networks:
      - mft_local

networks:
  mft_local:
    driver: bridge

volumes:
  redis_data_local:
  postgres_data_local:
  neo4j_data_local:
  prometheus_data_local:
  grafana_data_local:
  frontend_node_modules_local:
