services:
  redis:
    image: redis/redis-stack-server:latest
    container_name: hfcl_redis_local
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 2s
      retries: 5
      start_period: 5s
    volumes:
      - redis_data_local:/data
    networks:
      - hfcl_local

  neo4j:
    image: neo4j:5.26.0
    container_name: hfcl_neo4j_local
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: neo4j/password
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_security_procedures_unrestricted: apoc.*
      NEO4J_server_default__listen__address: 0.0.0.0
      NEO4J_server_bolt_advertised__address: neo4j:7687
      NEO4J_server_http_advertised__address: neo4j:7474
    volumes:
      - neo4j_data_local:/data
    networks:
      - hfcl_local

  mcp:
    build:
      context: .
      dockerfile: Dockerfile
    image: hfcl_mcp:local
    container_name: hfcl_mcp_local
    command: ["uv", "run", "python", "src/main_mcp.py"]
    ports:
      - "8050:8050"
    env_file:
      - .env
    environment:
      PYTHONUNBUFFERED: "1"
      REDIS_URL: "redis://redis:6379/0"
    volumes:
      - .:/app
    depends_on:
      redis:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - hfcl_local

  agent:
    build:
      context: .
      dockerfile: Dockerfile
    image: hfcl_agent:local
    container_name: hfcl_agent_local
    command:
      [
        "uv",
        "run",
        "uvicorn",
        "src.main_agent:app",
        "--host",
        "0.0.0.0",
        "--port",
        "8000",
        "--reload",
      ]
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      PORT: "8000"
      PYTHONUNBUFFERED: "1"
      REDIS_URL: "redis://redis:6379/0"
      MCP_SERVER_URL: "http://mcp:8050/sse"
      NEO4J_URI: "bolt://neo4j:7687"
      NEO4J_USER: "neo4j"
      NEO4J_PASSWORD: "password"
      OPENROUTER_SITE_URL: "${OPENROUTER_SITE_URL}"
      OPENROUTER_APP_TITLE: "${OPENROUTER_APP_TITLE}"
      NBFC_ROUTER_CACHE_DIR: ".cache_nbfc_router"
    volumes:
      - .:/app
    depends_on:
      redis:
        condition: service_healthy
      mcp:
        condition: service_started
      neo4j:
        condition: service_started
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - hfcl_local

  router_worker:
    profiles: ["router"]
    build:
      context: .
      dockerfile: Dockerfile
    image: hfcl_router_worker:local
    container_name: hfcl_router_worker_local
    command: ["uv", "run", "python", "-m", "src.agent_service.router.worker"]
    env_file:
      - .env
    environment:
      REDIS_URL: "redis://redis:6379/0"
      NEO4J_URI: "bolt://neo4j:7687"
      NEO4J_USER: "neo4j"
      NEO4J_PASSWORD: "password"
    volumes:
      - .:/app
    depends_on:
      redis:
        condition: service_healthy
      neo4j:
        condition: service_started
    networks:
      - hfcl_local

networks:
  hfcl_local:
    driver: bridge

volumes:
  redis_data_local:
  neo4j_data_local:
