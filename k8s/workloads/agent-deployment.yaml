apiVersion: apps/v1
kind: Deployment
metadata:
  name: agent
  namespace: mft
  labels:
    app.kubernetes.io/name: agent
    app.kubernetes.io/component: api-server
    app.kubernetes.io/part-of: mft-platform
spec:
  replicas: 2
  revisionHistoryLimit: 5
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: agent
  template:
    metadata:
      labels:
        app: agent
        app.kubernetes.io/name: agent
        app.kubernetes.io/component: api-server
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8000"
        prometheus.io/path: "/metrics"
    spec:
      terminationGracePeriodSeconds: 150
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app: agent
                topologyKey: kubernetes.io/hostname
      containers:
        - name: agent
          image: mft_agent:latest
          imagePullPolicy: IfNotPresent
          command:
            - gunicorn
            - src.main_agent:app
            - --config
            - gunicorn.conf.py
            - --bind
            - 0.0.0.0:8000
            - --workers
            - "2"
            - --worker-class
            - uvicorn.workers.UvicornWorker
            - --timeout
            - "180"
            - --access-logfile
            - "-"
            - --error-logfile
            - "-"
            - --log-level
            - info
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
          envFrom:
            - configMapRef:
                name: mft-app-config
          env:
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mft-secrets
                  key: POSTGRES_PASSWORD
            - name: OPENROUTER_API_KEY
              valueFrom:
                secretKeyRef:
                  name: mft-secrets
                  key: OPENROUTER_API_KEY
            - name: GROQ_API_KEYS
              valueFrom:
                secretKeyRef:
                  name: mft-secrets
                  key: GROQ_API_KEYS
            - name: EVAL_INGEST_KEY
              valueFrom:
                secretKeyRef:
                  name: mft-secrets
                  key: EVAL_INGEST_KEY
            - name: BASIC_AUTH_USERNAME
              valueFrom:
                secretKeyRef:
                  name: mft-secrets
                  key: BASIC_AUTH_USERNAME
            - name: BASIC_AUTH_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mft-secrets
                  key: BASIC_AUTH_PASSWORD
          resources:
            requests:
              cpu: "1"
              memory: 1Gi
            limits:
              cpu: "2"
              memory: 2Gi
          startupProbe:
            httpGet:
              path: /health
              port: http
            periodSeconds: 5
            failureThreshold: 30
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 2
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          volumeMounts:
            - name: geoip-data
              mountPath: /app/data/geoip
              readOnly: true
            - name: prometheus-multiproc
              mountPath: /tmp/prometheus_multiproc
      volumes:
        - name: geoip-data
          persistentVolumeClaim:
            claimName: geoip-data
        - name: prometheus-multiproc
          emptyDir: {}
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: geoip-data
  namespace: mft
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: local-path
  resources:
    requests:
      storage: 1Gi
---
apiVersion: v1
kind: Service
metadata:
  name: agent
  namespace: mft
  labels:
    app.kubernetes.io/name: agent
    app.kubernetes.io/component: api-server
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 8000
      targetPort: http
      protocol: TCP
  selector:
    app: agent
