apiVersion: batch/v1
kind: CronJob
metadata:
  name: geoip-updater
  namespace: mft
  labels:
    app.kubernetes.io/name: geoip-updater
    app.kubernetes.io/component: maintenance
    app.kubernetes.io/part-of: mft-platform
spec:
  schedule: "0 3 * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 2
      activeDeadlineSeconds: 600
      template:
        metadata:
          labels:
            app: geoip-updater
        spec:
          restartPolicy: OnFailure
          containers:
            - name: geoip-updater
              image: mft_agent:latest
              imagePullPolicy: IfNotPresent
              command:
                - /bin/bash
                - -lc
                - /app/scripts/update_free_geoip.sh
              envFrom:
                - configMapRef:
                    name: mft-app-config
              resources:
                requests:
                  cpu: 100m
                  memory: 128Mi
                limits:
                  cpu: 250m
                  memory: 256Mi
              volumeMounts:
                - name: geoip-data
                  mountPath: /app/data/geoip
          volumes:
            - name: geoip-data
              persistentVolumeClaim:
                claimName: geoip-data
