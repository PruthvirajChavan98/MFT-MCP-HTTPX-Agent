apiVersion: apps/v1
kind: Deployment
metadata:
  name: mcp
  namespace: mft
  labels:
    app.kubernetes.io/name: mcp
    app.kubernetes.io/component: mcp-server
    app.kubernetes.io/part-of: mft-platform
spec:
  replicas: 1
  revisionHistoryLimit: 5
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: mcp
  template:
    metadata:
      labels:
        app: mcp
        app.kubernetes.io/name: mcp
        app.kubernetes.io/component: mcp-server
    spec:
      terminationGracePeriodSeconds: 30
      containers:
        - name: mcp
          image: mft_mcp:latest
          imagePullPolicy: IfNotPresent
          command:
            - python
            - src/main_mcp.py
          ports:
            - name: http
              containerPort: 8050
              protocol: TCP
          envFrom:
            - configMapRef:
                name: mft-app-config
          env:
            - name: PYTHONUNBUFFERED
              value: "1"
            - name: BASIC_AUTH_USERNAME
              valueFrom:
                secretKeyRef:
                  name: mft-secrets
                  key: BASIC_AUTH_USERNAME
            - name: BASIC_AUTH_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mft-secrets
                  key: BASIC_AUTH_PASSWORD
          resources:
            requests:
              cpu: 500m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 768Mi
          startupProbe:
            tcpSocket:
              port: http
            periodSeconds: 5
            failureThreshold: 24
          readinessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 2
          livenessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: mcp
  namespace: mft
  labels:
    app.kubernetes.io/name: mcp
    app.kubernetes.io/component: mcp-server
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 8050
      targetPort: http
      protocol: TCP
  selector:
    app: mcp
