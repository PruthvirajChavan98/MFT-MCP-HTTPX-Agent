# SealedSecrets — encrypt with kubeseal before committing.
# Install: helm install sealed-secrets sealed-secrets/sealed-secrets -n kube-system
#
# To seal:
#   kubectl create secret generic mft-secrets --dry-run=client -o yaml \
#     --from-literal=POSTGRES_PASSWORD=<value> \
#     --from-literal=NEO4J_PASSWORD=<value> \
#     --from-literal=TUNNEL_TOKEN=<value> \
#     --from-literal=OPENROUTER_API_KEY=<value> \
#     --from-literal=GROQ_API_KEYS=<value> \
#     --from-literal=GRAFANA_ADMIN_PASSWORD=<value> \
#     --from-literal=EVAL_INGEST_KEY=<value> \
#     --from-literal=NGROK_AUTHTOKEN_LOCAL=<value> \
#     --from-literal=BASIC_AUTH_USERNAME=<value> \
#     --from-literal=BASIC_AUTH_PASSWORD=<value> \
#     -n mft | kubeseal -o yaml > sealed-secrets.yaml
#
# PLACEHOLDER — replace encryptedData with actual sealed values.
---
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: mft-secrets
  namespace: mft
spec:
  encryptedData:
    POSTGRES_PASSWORD: "REPLACE_WITH_SEALED_VALUE"
    NEO4J_PASSWORD: "REPLACE_WITH_SEALED_VALUE"
    TUNNEL_TOKEN: "REPLACE_WITH_SEALED_VALUE"
    OPENROUTER_API_KEY: "REPLACE_WITH_SEALED_VALUE"
    GROQ_API_KEYS: "REPLACE_WITH_SEALED_VALUE"
    GRAFANA_ADMIN_PASSWORD: "REPLACE_WITH_SEALED_VALUE"
    EVAL_INGEST_KEY: "REPLACE_WITH_SEALED_VALUE"
    BASIC_AUTH_USERNAME: "REPLACE_WITH_SEALED_VALUE"
    BASIC_AUTH_PASSWORD: "REPLACE_WITH_SEALED_VALUE"
  template:
    metadata:
      name: mft-secrets
      namespace: mft
      labels:
        app.kubernetes.io/part-of: mft-platform
    type: Opaque
