apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: neo4j
  namespace: mft
  labels:
    app.kubernetes.io/name: neo4j
    app.kubernetes.io/component: graph-database
    app.kubernetes.io/part-of: mft-platform
spec:
  serviceName: neo4j
  replicas: 1
  selector:
    matchLabels:
      app: neo4j
  template:
    metadata:
      labels:
        app: neo4j
        app.kubernetes.io/name: neo4j
        app.kubernetes.io/component: graph-database
    spec:
      terminationGracePeriodSeconds: 120
      containers:
        - name: neo4j
          image: neo4j:5.26.0
          ports:
            - name: http
              containerPort: 7474
            - name: bolt
              containerPort: 7687
          env:
            - name: NEO4J_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mft-secrets
                  key: NEO4J_PASSWORD
            - name: NEO4J_AUTH
              value: "neo4j/$(NEO4J_PASSWORD)"
            - name: NEO4J_PLUGINS
              value: '["apoc"]'
            - name: NEO4J_dbms_security_procedures_unrestricted
              value: "apoc.*"
            - name: NEO4J_server_default__listen__address
              value: "0.0.0.0"
            - name: NEO4J_server_bolt_advertised__address
              value: "neo4j.mft.svc.cluster.local:7687"
            - name: NEO4J_server_http_advertised__address
              value: "neo4j.mft.svc.cluster.local:7474"
            - name: NEO4J_server_memory_heap_initial__size
              valueFrom:
                configMapKeyRef:
                  name: mft-app-config
                  key: NEO4J_HEAP_INITIAL_SIZE
            - name: NEO4J_server_memory_heap_max__size
              valueFrom:
                configMapKeyRef:
                  name: mft-app-config
                  key: NEO4J_HEAP_MAX_SIZE
            - name: NEO4J_server_memory_pagecache_size
              valueFrom:
                configMapKeyRef:
                  name: mft-app-config
                  key: NEO4J_PAGECACHE_SIZE
          resources:
            requests:
              cpu: "1"
              memory: 1536Mi
            limits:
              cpu: "2"
              memory: 2Gi
          readinessProbe:
            exec:
              command:
                - bash
                - -c
                - cypher-shell -a bolt://localhost:7687 -u neo4j -p "$NEO4J_PASSWORD" "RETURN 1;" >/dev/null
            initialDelaySeconds: 60
            periodSeconds: 20
            timeoutSeconds: 15
            failureThreshold: 5
          livenessProbe:
            exec:
              command:
                - bash
                - -c
                - cypher-shell -a bolt://localhost:7687 -u neo4j -p "$NEO4J_PASSWORD" "RETURN 1;" >/dev/null
            initialDelaySeconds: 90
            periodSeconds: 30
            timeoutSeconds: 15
            failureThreshold: 3
          startupProbe:
            exec:
              command:
                - bash
                - -c
                - cypher-shell -a bolt://localhost:7687 -u neo4j -p "$NEO4J_PASSWORD" "RETURN 1;" >/dev/null
            periodSeconds: 10
            failureThreshold: 18
          volumeMounts:
            - name: data
              mountPath: /data
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes:
          - ReadWriteOnce
        storageClassName: local-path
        resources:
          requests:
            storage: 10Gi
---
apiVersion: v1
kind: Service
metadata:
  name: neo4j
  namespace: mft
  labels:
    app.kubernetes.io/name: neo4j
    app.kubernetes.io/component: graph-database
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 7474
      targetPort: 7474
    - name: bolt
      port: 7687
      targetPort: 7687
  selector:
    app: neo4j
