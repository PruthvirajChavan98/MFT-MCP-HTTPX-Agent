apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-agent-egress-to-data
  namespace: mft
spec:
  podSelector:
    matchLabels:
      app: agent
  policyTypes:
    - Egress
  egress:
    - to:
        - podSelector:
            matchLabels:
              app: redis
      ports:
        - port: 6379
    - to:
        - podSelector:
            matchLabels:
              cnpg.io/cluster: postgres
      ports:
        - port: 5432
    - to:
        - podSelector:
            matchLabels:
              app: neo4j
      ports:
        - port: 7687
    - to:
        - podSelector:
            matchLabels:
              app: mcp
      ports:
        - port: 8050
    - to: []
      ports:
        - port: 443
          protocol: TCP
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
---
