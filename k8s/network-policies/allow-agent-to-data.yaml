apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-prometheus-egress
  namespace: mft
spec:
  podSelector:
    matchLabels:
      app: prometheus
  policyTypes:
    - Egress
  egress:
    - to:
        - podSelector: {}
      ports:
        - port: 8000
          protocol: TCP
        - port: 2000
          protocol: TCP
        - port: 9093
          protocol: TCP
    - to: []
      ports:
        - port: 443
          protocol: TCP
        - port: 6443
          protocol: TCP
        - port: 53
          protocol: UDP
