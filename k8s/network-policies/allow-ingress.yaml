# Allow cloudflared → frontend (port 80)
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-cloudflared-to-frontend
  namespace: mft
spec:
  podSelector:
    matchLabels:
      app: frontend
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: cloudflared
      ports:
        - port: 80
          protocol: TCP
---
# Allow cloudflared → agent (port 8000)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-cloudflared-to-agent
  namespace: mft
spec:
  podSelector:
    matchLabels:
      app: agent
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: cloudflared
      ports:
        - port: 8000
          protocol: TCP
---
# Allow frontend nginx → agent (reverse proxy /api/)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-frontend-to-agent
  namespace: mft
spec:
  podSelector:
    matchLabels:
      app: agent
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: frontend
      ports:
        - port: 8000
          protocol: TCP
---
# Allow cloudflared egress to Cloudflare edge and internal services
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-cloudflared-egress
  namespace: mft
spec:
  podSelector:
    matchLabels:
      app: cloudflared
  policyTypes:
    - Egress
  egress:
    - to:
        - podSelector:
            matchLabels:
              app: frontend
      ports:
        - port: 80
    - to:
        - podSelector:
            matchLabels:
              app: agent
      ports:
        - port: 8000
    - to: []
      ports:
        - port: 443
          protocol: TCP
        - port: 7844
          protocol: TCP
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
