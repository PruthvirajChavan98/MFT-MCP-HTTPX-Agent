# Volumetric abuse defense — granular per-user quotas handled by FastAPI
limit_req_zone $binary_remote_addr zone=api_per_ip:10m rate=30r/s;
limit_conn_zone $binary_remote_addr zone=api_conn_per_ip:10m;
limit_req_zone $binary_remote_addr zone=stream_new_per_ip:10m rate=5r/s;

# Use Docker's embedded DNS resolver for runtime upstream resolution.
# 127.0.0.11 is Docker's built-in DNS server; `valid=10s` caches resolved
# names for 10 seconds so the resolver isn't hit on every single request.
# Combined with variable-form `proxy_pass` below, this means a recreate of
# `mft_agent` or `crm_api` is picked up on the next request without
# requiring frontend-prod to be recreated. Fixes the recurring 502
# stale-DNS outage we saw whenever a backend container was rebuilt.
resolver 127.0.0.11 valid=10s ipv6=off;

# Named `upstream { ... }` blocks are NOT used. Open-source nginx resolves
# `server <hostname>` once at startup and caches forever, so any backend
# container recreate that changes the IP will leave nginx proxying to a
# dead address until frontend-prod is also recreated. The variable-in-
# `proxy_pass` pattern below avoids that. Trade-off: no upstream connection
# pool / `keepalive`, but the 1 ms TCP-handshake cost per request is a
# fair price for never having a stale-DNS outage again.

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # ── Gzip ──────────────────────────────────────────────────────────────
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;
    gzip_min_length 256;
    gzip_vary on;

    # ── Security headers ──────────────────────────────────────────────────
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ── SSE streaming endpoint (before general /api/) ─────────────────────
    location /api/agent/stream {
        limit_req zone=stream_new_per_ip burst=10 nodelay;

        # Variable-form `proxy_pass` forces runtime DNS resolution.
        # `rewrite ^/api(.*)$ $1 break;` strips the `/api` prefix so the
        # upstream URI matches the previous static-config behavior
        # (`/api/agent/stream` -> `/agent/stream`). Query string is preserved
        # automatically — `rewrite` keeps `$args` unless `?` is in the target.
        set $agent_upstream http://agent:8000;
        rewrite ^/api(/.*)$ $1 break;
        proxy_pass $agent_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";

        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        chunked_transfer_encoding on;
    }

    # ── Reverse-proxy /crm-api/ → internal CRM GraphQL backend ──────────
    # Direct container-to-container over the shared `databases` Docker network;
    # avoids a double-hairpin through Cloudflare. Variable-form `proxy_pass`
    # + the http-context `resolver` directive picks up `crm_api` recreates
    # at runtime instead of at frontend-prod startup.
    location /crm-api/ {
        set $crm_upstream http://crm_api:8080;
        rewrite ^/crm-api(/.*)$ $1 break;
        proxy_pass $crm_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";

        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 30s;
        proxy_send_timeout 30s;
    }

    # ── Reverse-proxy /api/ → backend (strip /api prefix) ────────────────
    location /api/ {
        limit_req zone=api_per_ip burst=60 nodelay;
        limit_conn api_conn_per_ip 50;

        set $agent_upstream http://agent:8000;
        rewrite ^/api(/.*)$ $1 break;
        proxy_pass $agent_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";

        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        chunked_transfer_encoding on;
    }

    # ── Hashed static assets — aggressive caching ─────────────────────────
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # ── SPA fallback — all other routes serve index.html ──────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }
}
