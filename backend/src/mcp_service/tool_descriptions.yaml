generate_otp: |
  Purpose: Generate and send an OTP to the user's WhatsApp number.
  Input variables:
    - user_input: 10-digit Indian mobile number (without country code).
  Returns:
    - CSV string with columns: status,phone_number,message

validate_otp: |
  Purpose: Validate OTP for the current session and finalize authentication.
  Input variables:
    - otp: One-time password entered by the user.
  Returns:
    - CSV string with columns:
      status,message,user_details.*,loans,active_loan,hint
  Notes:
    - If the user has exactly one loan, active_loan is set automatically.
    - If the user has multiple loans, call list_loans() then select_loan(loan_number).

is_logged_in: |
  Purpose: Check whether the current session is authenticated.
  Input variables:
    - none
  Returns:
    - JSON: {"logged_in": <bool>}

dashboard_home: |
  Purpose: Fetch dashboard summary for the authenticated session.
  Input variables:
    - none
  Returns:
    - Structured response with loan and account summary fields.

loan_details: |
  Purpose: Fetch detailed loan information for the authenticated session.
  Input variables:
    - none
  Returns:
    - Structured response including loan summary, payment summary, and overdue breakup.

foreclosure_details: |
  Purpose: Fetch foreclosure and closure eligibility details.
  Input variables:
    - none
  Returns:
    - Structured response with closure date, NOC status, and related metadata.

overdue_details: |
  Purpose: Fetch overdue summary for the current loan.
  Input variables:
    - none
  Returns:
    - Structured response with total overdue, bucket, and charge breakup.

noc_details: |
  Purpose: Fetch No Objection Certificate (NOC) availability details.
  Input variables:
    - none
  Returns:
    - Structured response with NOC eligibility and generated date metadata.

repayment_schedule: |
  Purpose: Fetch full repayment schedule for the current loan.
  Input variables:
    - none
  Returns:
    - Structured response with installments and schedule summary.

download_welcome_letter: |
  Purpose: Generate a Welcome Letter PDF on-demand and return the password hint needed to open it.
  Input variables:
    - none
  Returns:
    - status: "ready" on success
    - document_type: "welcome-letter"
    - password_hint: hint describing how to derive the document password
    - filename: suggested filename
  Notes:
    - The PDF itself is not returned. The user must download it separately using
      a bearer token at GET /mockfin-service/download/welcome-letter
    - Tell the user the password_hint so they can derive the password themselves.

download_soa: |
  Purpose: Generate a Statement of Account (SOA) PDF for a date range and return the password hint.
  Input variables:
    - start_date: Start date in YYYY-MM-DD format (e.g. "2025-01-01").
    - end_date: End date in YYYY-MM-DD format (e.g. "2025-12-31").
  Returns:
    - status: "ready" on success
    - document_type: "soa"
    - password_hint: hint describing how to derive the document password
    - filename: suggested filename
  Notes:
    - Requires an active loan to be selected (call select_loan first if needed).
    - The PDF itself is not returned. The user must download it separately using
      a bearer token at POST /mockfin-service/download/soa
    - Tell the user the password_hint so they can derive the password themselves.

list_loans: |
  Purpose: List all loans linked to the authenticated user's account.
  Input variables:
    - none
  Returns:
    - Pipe-delimited table with columns: loan_number|status|product_code|active
    - The active column shows which loan is currently selected for operations.

select_loan: |
  Purpose: Set the active loan for the current session.
  Input variables:
    - loan_number: The loan_number value from list_loans() output.
  Returns:
    - Confirmation string, or an error with the list of valid loan numbers.
