groups:
  - name: security-alerts
    rules:
      - alert: TorListStale
        expr: tor_list_staleness_seconds > 7200
        for: 5m
        labels:
          severity: critical
          service: agent
        annotations:
          summary: "Tor exit list is stale"
          description: "Tor exit list refresh age is above 2 hours."

      - alert: TorBlocksSpike
        expr: increase(tor_blocks_total[5m]) > 50
        for: 2m
        labels:
          severity: warning
          service: agent
        annotations:
          summary: "Tor blocks spiking"
          description: "More than 50 Tor-blocked requests in 5 minutes."

      - alert: SessionDenySpike
        expr: increase(session_decisions_total{decision="deny"}[5m]) > 20
        for: 2m
        labels:
          severity: warning
          service: agent
        annotations:
          summary: "Session risk denies increased"
          description: "More than 20 deny decisions in 5 minutes."

      - alert: HighStepUpRate
        expr: increase(session_decisions_total{decision="step_up"}[10m]) > 100
        for: 5m
        labels:
          severity: warning
          service: agent
        annotations:
          summary: "High step-up authentication rate"
          description: "Session security step-up decisions are elevated."

  - name: trace-reliability-alerts
    rules:
      - alert: RuntimeTracePersistenceFailures
        expr: increase(agent_runtime_trace_persist_total{status="failure"}[10m]) > 0
        for: 5m
        labels:
          severity: warning
          service: agent
        annotations:
          summary: "Runtime trace persistence failures detected"
          description: "At least one runtime trace persistence failure occurred in the last 10 minutes."

      - alert: RuntimeTracePersistenceFailureRateHigh
        expr: |
          (
            increase(agent_runtime_trace_persist_total{status="failure"}[10m])
            /
            clamp_min(increase(agent_runtime_trace_persist_total{status="success"}[10m]) + increase(agent_runtime_trace_persist_total{status="failure"}[10m]), 1)
          ) > 0.02
        for: 10m
        labels:
          severity: critical
          service: agent
        annotations:
          summary: "Runtime trace persistence failure rate is high"
          description: "Runtime trace persistence failure rate exceeded 2% over the last 10 minutes."

      - alert: ShadowTraceQueueBacklogHigh
        expr: agent_shadow_trace_queue_depth > 500
        for: 10m
        labels:
          severity: warning
          service: agent
        annotations:
          summary: "Shadow trace queue backlog is high"
          description: "Shadow trace queue depth has remained above 500 for at least 10 minutes."

      - alert: ShadowTraceDeadLetterQueueNonZero
        expr: agent_shadow_trace_dlq_depth > 0
        for: 5m
        labels:
          severity: warning
          service: agent
        annotations:
          summary: "Shadow trace dead-letter queue is non-empty"
          description: "Dead-lettered shadow traces are present and require investigation."
