# TLS 1.3 edge termination for MFT Agent
# Placed at ingress/reverse proxy in front of FastAPI/Gunicorn.
#
# Rate limiting here is strictly volumetric abuse defense.
# Granular per-user / per-session quotas are enforced by the
# FastAPI RateLimiterManager which has access to auth headers.

# ── Volumetric Abuse Defense (high thresholds to avoid NAT collateral) ────
# 50 concurrent connections per IP — generous for corporate NATs,
# blocks socket-exhaustion attacks.
limit_conn_zone $binary_remote_addr zone=conn_per_ip:10m;
limit_conn_status 429;
limit_conn_log_level warn;

# 30 req/s per IP, burst 60 — a human generates ~2-5 req/s;
# only automated floods will trip this.
limit_req_zone $binary_remote_addr zone=req_per_ip:10m rate=30r/s;
limit_req_status 429;
limit_req_log_level warn;

# SSE streaming: 5 new connections/s per IP, burst 10
# (limits new-connection establishment rate, not active long-lived streams)
limit_req_zone $binary_remote_addr zone=stream_new_per_ip:10m rate=5r/s;

server {
    listen 443 ssl http2;
    server_name _;

    ssl_certificate /etc/nginx/certs/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/privkey.pem;

    ssl_protocols TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:10m;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # ── Agent streaming endpoint (before catch-all) ───────────────────────
    location /agent/stream {
        limit_req zone=stream_new_per_ip burst=10 nodelay;

        proxy_pass http://agent:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Real-IP $remote_addr;

        proxy_http_version 1.1;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        chunked_transfer_encoding on;
    }

    # ── Default upstream ──────────────────────────────────────────────────
    location / {
        limit_req zone=req_per_ip burst=60 nodelay;
        limit_conn conn_per_ip 50;

        proxy_pass http://agent:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
