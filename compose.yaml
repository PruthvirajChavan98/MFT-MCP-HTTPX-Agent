# compose.yaml — All services run without profiles.
# Infrastructure (redis, postgres, milvus) is managed by
# /home/pruthvi/projects/databases/compose.yaml — start that first.

# ── YAML Anchors ────────────────────────────────────────────────────────────

x-backend-build: &backend-build
  context: ./backend
  dockerfile: Dockerfile

x-agent-env: &agent-env
  PORT: "8000"
  PYTHONUNBUFFERED: "1"
  MCP_SERVER_URL: "http://mcp:8050/sse"
  REDIS_URL: "redis://redis:6379/0"
  REDIS_MAX_CONNECTIONS: "50"
  POSTGRES_DSN: "postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}"
  POSTGRES_POOL_MIN: "10"
  POSTGRES_POOL_MAX: "50"
  MILVUS_URI: "http://milvus:19530"
  SHADOW_EVAL_ENABLED: "1"
  SHADOW_EVAL_SAMPLE_RATE: "${SHADOW_EVAL_SAMPLE_RATE:-1.0}"
  SHADOW_EVAL_CAPTURE: "light"
  OPENROUTER_SITE_URL: "${OPENROUTER_SITE_URL}"
  OPENROUTER_APP_TITLE: "${OPENROUTER_APP_TITLE}"
  NBFC_ROUTER_ENABLED: "true"
  NBFC_ROUTER_MODE: "hybrid"
  NBFC_ROUTER_CHAT_MODEL: "z-ai/glm-4.7"
  NBFC_ROUTER_EMBED_MODEL: "openai/text-embedding-3-small"
  NBFC_ROUTER_CACHE_DIR: ".cache_nbfc_router"
  NBFC_ROUTER_ANSWERABILITY_ENABLED: "true"
  NBFC_ROUTER_ANSWERABILITY_KB_THRESHOLD: "0.58"
  NBFC_ROUTER_ANSWERABILITY_KB_HEURISTIC_THRESHOLD: "0.38"
  NBFC_ROUTER_ANSWERABILITY_MCP_THRESHOLD: "0.52"
  NBFC_ROUTER_ANSWERABILITY_MARGIN: "0.04"
  NBFC_ROUTER_ANSWERABILITY_MAX_TOOLS: "60"
  NBFC_ROUTER_ANSWERABILITY_VECTOR_CACHE_SIZE: "64"
  AGENT_INLINE_ROUTER_ENABLED: "false"
  AGENT_INLINE_ROUTER_EXPOSE: "false"
  AGENT_STREAM_EXPOSE_INTERNAL_EVENTS: "false"
  AGENT_STREAM_EXPOSE_REASONING: "true"
  SECURITY_ENABLED: "true"
  SECURITY_TRUST_PROXY_HEADERS: "true"
  SECURITY_PREFER_IP_HEADER: "x-forwarded-for"
  SECURITY_CRITICAL_PATHS: "/agent,/graphql,/eval"
  SECURITY_MONITORED_PATHS: "/health,/metrics"
  TOR_REFRESH_SECONDS: "1800"
  TOR_STALE_AFTER_SECONDS: "7200"
  TOR_NEGATIVE_CACHE_TTL_SECONDS: "300"
  TOR_NEGATIVE_CACHE_CLEANUP_INTERVAL: "1000"
  SECURITY_IMPOSSIBLE_TRAVEL_KMH: "900"
  SECURITY_CONCURRENT_IP_WINDOW_SECONDS: "300"
  SECURITY_CONCURRENT_IP_THRESHOLD: "3"
  SECURITY_RISK_IMPOSSIBLE_TRAVEL: "0.6"
  SECURITY_RISK_CONCURRENT_IP: "0.5"
  SECURITY_RISK_DEVICE_MISMATCH: "0.4"
  SECURITY_RISK_GEO_ANOMALY: "0.3"
  SECURITY_RISK_ALLOW_THRESHOLD: "0.4"
  SECURITY_RISK_STEP_UP_THRESHOLD: "0.7"
  PROMETHEUS_METRICS_ENABLED: "true"
  GEOIP_DB_PATH: "/app/data/geoip/GeoLite2-City.mmdb"

# ── Services ────────────────────────────────────────────────────────────────

services:

  # ── Database Bootstrap (runs once, idempotent) ────────────────────────────

  db-migrate:
    image: postgres:18.3-bookworm
    container_name: mft_db_migrate
    restart: "no"
    entrypoint: ["/bin/bash", "/scripts/db_migrate.sh"]
    environment:
      POSTGRES_ADMIN_DSN: "postgresql://${PG_ADMIN_USER:-postgresadmin}:${PG_ADMIN_PASSWORD:-localpass}@postgres:5432/${PG_ADMIN_DB:-app}"
      MFT_POSTGRES_USER: "${POSTGRES_USER:-mft}"
      MFT_POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-mft_password}"
      MFT_POSTGRES_DB: "${POSTGRES_DB:-mft_security}"
    volumes:
      - ./backend/scripts/db_migrate.sh:/scripts/db_migrate.sh:ro
      - ./backend/infra/sql:/app/infra/sql:ro
    mem_limit: 128m
    cpus: 0.25
    networks:
      - databases

  # ── Deployed Stack ────────────────────────────────────────────────────────

  mcp:
    build:
      <<: *backend-build
      cache_from:
        - mft_mcp:latest
    image: mft_mcp:latest
    container_name: mft_mcp
    command: ["python", "src/main_mcp.py"]
    restart: unless-stopped
    ports:
      - "127.0.0.1:${MCP_PORT:-8050}:8050"
    env_file:
      - ./.env
    environment:
      PYTHONUNBUFFERED: "1"
      REDIS_URL: "redis://redis:6379/0"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    mem_limit: 768m
    cpus: 1.00
    networks:
      - mft_net
      - databases

  agent:
    build:
      <<: *backend-build
      cache_from:
        - mft_agent:latest
    image: mft_agent:latest
    container_name: mft_agent
    command:
      [
        "gunicorn", "src.main_agent:app",
        "--config", "gunicorn.conf.py",
        "--bind", "0.0.0.0:8000",
        "--workers", "2",
        "--worker-class", "uvicorn.workers.UvicornWorker",
        "--timeout", "${AGENT_GUNICORN_TIMEOUT:-0}",
        "--access-logfile", "-",
        "--error-logfile", "-",
        "--log-level", "info"
      ]
    restart: unless-stopped
    env_file:
      - ./.env
    environment:
      <<: *agent-env
      GUNICORN_WORKERS: "4"
      RUNTIME_TRACE_CAPTURE: "${RUNTIME_TRACE_CAPTURE:-full}"
      SHADOW_TRACE_QUEUE_MAX_RETRIES: "${SHADOW_TRACE_QUEUE_MAX_RETRIES:-3}"
      SHADOW_TRACE_DLQ_KEY: "${SHADOW_TRACE_DLQ_KEY:-agent:shadow:trace_dlq}"
    volumes:
      - ./backend/data/geoip:/app/data/geoip
    depends_on:
      mcp:
        condition: service_started
      db-migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8000/health/ready >/dev/null"]
      interval: 15s
      timeout: 4s
      retries: 8
      start_period: 20s
    extra_hosts:
      - "host.docker.internal:host-gateway"
    mem_limit: 2g
    cpus: 2.00
    networks:
      - mft_net
      - databases

  geoip_updater:
    build: *backend-build
    container_name: mft_geoip_updater
    command: ["/bin/bash", "-lc", "while true; do /app/scripts/update_free_geoip.sh; sleep 86400; done"]
    restart: unless-stopped
    environment:
      GEOIP_FREE_ONLY: "true"
      GEOIP_DATA_DIR: "/app/data/geoip"
      MAXMIND_ACCOUNT_ID: "${MAXMIND_ACCOUNT_ID}"
      MAXMIND_LICENSE_KEY: "${MAXMIND_LICENSE_KEY}"
      IP2PROXY_LITE_URL: "${IP2PROXY_LITE_URL}"
    volumes:
      - ./backend/data/geoip:/app/data/geoip
      - ./backend/scripts/update_free_geoip.sh:/app/scripts/update_free_geoip.sh:ro
    mem_limit: 256m
    cpus: 0.25
    networks:
      - mft_net

  # ── Prod services ─────────────────────────────────────────────────────────

  frontend-prod:
    build:
      context: "./Agent UI and Admin Console"
      dockerfile: Dockerfile.prod
    image: mft_frontend_prod:latest
    container_name: mft_frontend_prod
    restart: unless-stopped
    environment:
      FRONTEND_API_BASE_URL: "/api"
      FRONTEND_APP_ENV: "production"
    depends_on:
      agent:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:80/ > /dev/null"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 5s
    mem_limit: 256m
    cpus: 0.50
    networks:
      - mft_net
      - databases   # reach crm_api directly instead of hairpinning through Cloudflare

  shadow_judge_worker:
    build:
      <<: *backend-build
      cache_from:
        - mft_shadow_judge_worker:latest
    image: mft_shadow_judge_worker:latest
    container_name: mft_shadow_judge_worker
    command: ["python", "-m", "src.agent_service.worker.shadow_judge_worker"]
    restart: unless-stopped
    env_file:
      - ./.env
    environment:
      PYTHONUNBUFFERED: "1"
      REDIS_URL: "redis://redis:6379/0"
      MILVUS_URI: "http://milvus:19530"
      SHADOW_JUDGE_ENABLED: "1"
      POSTGRES_DSN: "postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}"
    mem_limit: 768m
    cpus: 1.00
    networks:
      - mft_net
      - databases

  cloudflared-prod:
    image: cloudflare/cloudflared:latest
    container_name: mft_cloudflared_prod
    restart: unless-stopped
    volumes:
      - ./cloudflared/config.yml:/etc/cloudflared/config.yml:ro
      - ./cloudflared/credentials.json:/etc/cloudflared/credentials.json:ro
    command: ["tunnel", "--config", "/etc/cloudflared/config.yml", "--no-autoupdate", "run"]
    depends_on:
      frontend-prod:
        condition: service_healthy
    mem_limit: 256m
    cpus: 0.50
    networks:
      - mft_net

  # ── Monitoring ────────────────────────────────────────────────────────────

  prometheus:
    image: prom/prometheus:v2.53.1
    container_name: mft_prometheus
    restart: unless-stopped
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.enable-lifecycle"
    ports:
      - "127.0.0.1:${PROMETHEUS_PORT:-19090}:9090"
    volumes:
      - ./backend/infra/monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./backend/infra/monitoring/prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus_data:/prometheus
    depends_on:
      alertmanager:
        condition: service_started
    mem_limit: 512m
    cpus: 0.75
    networks:
      - mft_net

  alertmanager:
    image: prom/alertmanager:v0.28.0
    container_name: mft_alertmanager
    restart: unless-stopped
    command:
      - "--config.file=/etc/alertmanager/alertmanager.yml"
    ports:
      - "127.0.0.1:${ALERTMANAGER_PORT:-19093}:9093"
    volumes:
      - ./backend/infra/monitoring/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
    mem_limit: 256m
    cpus: 0.50
    networks:
      - mft_net

  grafana:
    image: grafana/grafana:11.1.4
    container_name: mft_grafana
    restart: unless-stopped
    ports:
      - "127.0.0.1:${GRAFANA_PORT:-13000}:3000"
    environment:
      GF_SECURITY_ADMIN_USER: "${GRAFANA_ADMIN_USER}"
      GF_SECURITY_ADMIN_PASSWORD: "${GRAFANA_ADMIN_PASSWORD}"
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./backend/infra/monitoring/grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ./backend/infra/monitoring/grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./backend/infra/monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      prometheus:
        condition: service_started
    mem_limit: 512m
    cpus: 0.75
    networks:
      - mft_net

# ── Networks ─────────────────────────────────────────────────────────────────

networks:
  mft_net:
    name: ${MFT_NETWORK_NAME:-mft_local}
    driver: bridge
  databases:
    name: databases
    external: true  # managed by /home/pruthvi/projects/databases/compose.yaml

# ── Volumes ──────────────────────────────────────────────────────────────────

volumes:
  prometheus_data:
  grafana_data:
  prometheus_multiproc:
