[project]
name = "mcp-tutorial"
version = "0.1.0"
description = "Add your description here"
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
    "fastapi>=0.115.13",
    "fastmcp>=2.8.1",
    "ipykernel>=7.1.0",
    "langchain>=0.3.25",
    "langchain-deepseek>=0.1.4",
    "langchain-groq>=0.3.8",
    "langchain-mcp-adapters>=0.1.7",
    "langchain-neo4j>=0.5.0",
    "langchain-nvidia-ai-endpoints>=0.3.19",
    "langchain-openai>=0.3.23",
    "langgraph>=0.4.8",
    "langgraph-checkpoint-redis>=0.1.0",
    "mcp>=1.9.4",
    "pdfplumber>=0.11.9",
    "redis>=6.2.0",
    "strawberry-graphql>=0.288.2",
    "toon-format>=0.1.0",
]

[tool.uv.sources]
toon-format = { git = "https://github.com/toon-format/toon-python.git" }

[dependency-groups]
dev = [
    "fakeredis>=2.33.0",
    "pytest>=9.0.2",
    "pytest-asyncio>=1.3.0",
]
