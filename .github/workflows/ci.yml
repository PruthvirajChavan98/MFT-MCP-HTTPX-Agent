name: Enterprise P0 CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  frontend:
    name: Frontend Reliability Gate
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Chatbot UI and Admin Console
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: Chatbot UI and Admin Console/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Tests
        run: npm run test

      - name: Deprecation gate
        run: npm run verify:deprecation

      - name: Build warning gate
        run: npm run build:warning-check

  backend:
    name: Backend Reliability Gate
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Sync dependencies
        run: uv sync --all-groups

      - name: Stream contract tests
        run: |
          uv run python -m pytest tests/test_agent_stream_events.py tests/test_agent_query_contract.py tests/test_agent_stream_terminal_contract.py

      - name: Deprecation gate
        run: |
          PYTHONWARNINGS='error::DeprecationWarning,error::PendingDeprecationWarning' uv run python -m pytest
