services:
  redis:
    image: redis/redis-stack-server:latest
    container_name: hfcl_redis
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 2s
      retries: 3
      start_period: 5s
    volumes:
      - redis_data:/data
    networks:
      - hfcl_network

  neo4j:
    image: neo4j:5.26.0
    container_name: hfcl_neo4j
    ports:
      - "127.0.0.1:7474:7474"
      - "127.0.0.1:7687:7687"
    environment:
      NEO4J_AUTH: neo4j/password
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_security_procedures_unrestricted: apoc.*
      NEO4J_server_default__listen__address: 0.0.0.0
      NEO4J_server_bolt_advertised__address: neo4j:7687
      NEO4J_server_http_advertised__address: neo4j:7474
    volumes:
      - ./neo4j_data:/data
    restart: unless-stopped
    networks:
      - hfcl_network

  mcp:
    build:
      context: .
      dockerfile: Dockerfile
      cache_from:
        - hfcl_mcp:latest
    image: hfcl_mcp:latest
    container_name: hfcl_mcp
    command: ["python", "src/main_mcp.py"]
    ports:
      - "127.0.0.1:8050:8050"
    env_file:
      - .env
    environment:
      PYTHONUNBUFFERED: "1"
      REDIS_URL: "redis://redis:6379/0"
    depends_on:
      redis:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    networks:
      - hfcl_network

  agent:
    build:
      context: .
      dockerfile: Dockerfile
      cache_from:
        - hfcl_agent:latest
    image: hfcl_agent:latest
    container_name: hfcl_agent
    command: [
      "gunicorn", "src.main_agent:app",
      "--config", "gunicorn.conf.py",
      "--bind", "0.0.0.0:8000",
      "--workers", "2",
      "--worker-class", "uvicorn.workers.UvicornWorker",
      "--timeout", "0",
      "--access-logfile", "-",
      "--error-logfile", "-",
      "--log-level", "info"
    ]
    ports:
      - "127.0.0.1:8005:8000"
    env_file:
      - .env
    environment:
      PORT: "8000"
      GUNICORN_WORKERS: "4"
      MCP_SERVER_URL: "http://mcp:8050/sse"
      PYTHONUNBUFFERED: "1"
      REDIS_URL: "redis://redis:6379/0"
      NEO4J_URI: "bolt://neo4j:7687"
      NEO4J_USER: "neo4j"
      NEO4J_PASSWORD: "password"

      SHADOW_EVAL_ENABLED: "1"
      SHADOW_EVAL_SAMPLE_RATE: "0.1"
      SHADOW_EVAL_CAPTURE: "light"

      OPENROUTER_SITE_URL: "${OPENROUTER_SITE_URL}"
      OPENROUTER_APP_TITLE: "${OPENROUTER_APP_TITLE}"

      NBFC_ROUTER_ENABLED: "true"
      NBFC_ROUTER_MODE: "hybrid"
      NBFC_ROUTER_CHAT_MODEL: "z-ai/glm-4.7"
      NBFC_ROUTER_EMBED_MODEL: "openai/text-embedding-3-small"
      NBFC_ROUTER_CACHE_DIR: ".cache_nbfc_router"
    depends_on:
      - mcp
      - redis
      - neo4j
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    networks:
      - hfcl_network

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: hfcl_cloudflared
    env_file:
      - .env
    volumes:
      - ./cloudflared/config.yml:/etc/cloudflared/config.yml:ro
    command: ["tunnel", "--no-autoupdate", "run", "--token", "${TUNNEL_TOKEN}"]
    depends_on:
      - agent
      - mcp
    restart: unless-stopped
    networks:
      - hfcl_network

  router_worker:
    build:
      context: .
      dockerfile: Dockerfile
      cache_from:
        - hfcl_router_worker:latest
    image: hfcl_router_worker:latest
    container_name: hfcl_router_worker
    command: ["python", "-m", "src.agent_service.router.worker"]
    env_file:
      - .env
    environment:
      REDIS_URL: "redis://redis:6379/0"
      NEO4J_URI: "bolt://neo4j:7687"
      NEO4J_USER: "neo4j"
      NEO4J_PASSWORD: "password"
    depends_on:
      - redis
      - neo4j
    restart: unless-stopped
    networks:
      - hfcl_network

networks:
  hfcl_network:
    driver: bridge

volumes:
  redis_data: