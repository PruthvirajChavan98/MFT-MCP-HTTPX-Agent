services:
  redis:
    image: redis/redis-stack-server:latest
    container_name: hfcl_redis
    restart: unless-stopped

  mcp:
    build:
      context: .
    container_name: hfcl_mcp
    command: ["python", "src/main_mcp.py"]
    env_file:
      - .env
    environment:
      PYTHONUNBUFFERED: "1"
      REDIS_URL: "redis://redis:6379/0" 
    depends_on:
      - redis
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  agent:
    build:
      context: .
    container_name: hfcl_agent
    command: ["uvicorn", "src.main_agent:app", "--host", "0.0.0.0", "--port", "8000"]
    env_file:
      - .env
    environment:
      PORT: "8000"
      MCP_SERVER_URL: "http://mcp:8050/sse"
      PYTHONUNBUFFERED: "1"
      REDIS_URL: "redis://redis:6379/0" 
    depends_on:
      - mcp
      - redis
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: hfcl_cloudflared
    env_file:
      - .env
    volumes:
      - ./cloudflared/config.yml:/etc/cloudflared/config.yml:ro
    command: ["tunnel", "--no-autoupdate", "run", "--token", "${TUNNEL_TOKEN}"]
    depends_on:
      - agent
      - mcp
    restart: unless-stopped
