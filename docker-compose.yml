services:
  redis:
    # Changed from redis:7-alpine to redis-stack-server to support FT._LIST
    image: redis/redis-stack-server:latest
    container_name: hfcl_redis
    ports:
      # HOST:CONTAINER -> Expose on 6380 to avoid conflict with CRM (6379)
      - "6380:6379"
    restart: unless-stopped

  mcp:
    build:
      context: .
    container_name: hfcl_mcp
    command: ["python", "serverNew.py"]
    env_file:
      - .env
    environment:
      PYTHONUNBUFFERED: "1"
      # Internal docker networking still uses port 6379
      REDIS_URL: "redis://redis:6379/0" 
    ports:
      - "8050:8050"
    depends_on:
      - redis
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  agent:
    build:
      context: .
    container_name: hfcl_agent
    command: ["uvicorn", "langchain_client_new:app", "--host", "0.0.0.0", "--port", "8000"]
    env_file:
      - .env
    environment:
      PORT: "8000"
      MCP_SERVER_URL: "http://mcp:8050/sse"
      PYTHONUNBUFFERED: "1"
      # Internal docker networking still uses port 6379
      REDIS_URL: "redis://redis:6379/0" 
    ports:
      - "8085:8000"
    depends_on:
      - mcp
      - redis
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: hfcl_cloudflared
    env_file:
      - .env
    volumes:
      - ./cloudflared/config.yml:/etc/cloudflared/config.yml:ro
    command: ["tunnel", "--no-autoupdate", "run", "--token", "${TUNNEL_TOKEN}"]
    depends_on:
      - agent
      - mcp
    restart: unless-stopped
