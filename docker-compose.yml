services:
  redis:
    image: redis/redis-stack-server:latest
    container_name: hfcl_redis
    restart: unless-stopped

  neo4j:
    image: neo4j:5.26.0
    container_name: hfcl_neo4j
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: neo4j/password
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_security_procedures_unrestricted: apoc.*
      NEO4J_server_default__listen__address: 0.0.0.0
      NEO4J_server_bolt_advertised__address: neo4j:7687
      NEO4J_server_http_advertised__address: neo4j:7474
    volumes:
      - ./neo4j_data:/data
    restart: unless-stopped

  mcp:
    build:
      context: .
    container_name: hfcl_mcp
    command: ["python", "src/main_mcp.py"]
    env_file:
      - .env
    environment:
      PYTHONUNBUFFERED: "1"
      REDIS_URL: "redis://redis:6379/0"
    depends_on:
      - redis
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  agent:
    build:
      context: .
    container_name: hfcl_agent
    command: ["uvicorn", "src.main_agent:app", "--host", "0.0.0.0", "--port", "8000"]
    ports:
      - "127.0.0.1:8005:8000"
    env_file:
      - .env
    environment:
      PORT: "8000"
      MCP_SERVER_URL: "http://mcp:8050/sse"
      PYTHONUNBUFFERED: "1"
      REDIS_URL: "redis://redis:6379/0"
      NEO4J_URI: "bolt://neo4j:7687"
      NEO4J_USER: "neo4j"
      NEO4J_PASSWORD: "password"

      SHADOW_EVAL_ENABLED: "1"
      SHADOW_EVAL_SAMPLE_RATE: "1.0"
      SHADOW_EVAL_CAPTURE: "full"

      # OpenRouter attribution (optional but recommended)
      # Put real values in .env; these defaults are safe
      OPENROUTER_SITE_URL: "${OPENROUTER_SITE_URL}"
      OPENROUTER_APP_TITLE: "${OPENROUTER_APP_TITLE}"

      # NBFC router (GLM vs embeddings)
      NBFC_ROUTER_ENABLED: "true"
      NBFC_ROUTER_MODE: "hybrid"            # embeddings|llm|hybrid|compare
      NBFC_ROUTER_CHAT_MODEL: "z-ai/glm-4.7"
      NBFC_ROUTER_EMBED_MODEL: "openai/text-embedding-3-small"
      NBFC_ROUTER_CACHE_DIR: ".cache_nbfc_router"
    depends_on:
      - mcp
      - redis
      - neo4j
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: hfcl_cloudflared
    env_file:
      - .env
    volumes:
      - ./cloudflared/config.yml:/etc/cloudflared/config.yml:ro
    command: ["tunnel", "--no-autoupdate", "run", "--token", "${TUNNEL_TOKEN}"]
    depends_on:
      - agent
      - mcp
    restart: unless-stopped

  router_worker:
    build:
      context: .
    container_name: hfcl_router_worker
    command: ["python", "-m", "src.agent_service.router.worker"]
    env_file:
      - .env
    environment:
      REDIS_URL: "redis://redis:6379/0"
      NEO4J_URI: "bolt://neo4j:7687"
      NEO4J_USER: "neo4j"
      NEO4J_PASSWORD: "password"
    depends_on:
      - redis
      - neo4j
    restart: unless-stopped