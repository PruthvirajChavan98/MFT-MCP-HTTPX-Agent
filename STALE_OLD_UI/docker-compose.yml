services:
  dual_stream_app:
    build: .
    container_name: dual-stream-ai
    restart: unless-stopped
    # ports:             <-- DELETE THESE LINES
    #   - "3001:80"      <-- DELETE THESE LINES
    networks:
      - dual_stream_net

  dual_stream_cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: dual-stream-cloudflared
    restart: unless-stopped
    depends_on:
      - dual_stream_app
    command: tunnel run
    environment:
      - TUNNEL_TOKEN=${CLOUDFLARE_TUNNEL_TOKEN}
    networks:
      - dual_stream_net

networks:
  dual_stream_net:
    driver: bridge
