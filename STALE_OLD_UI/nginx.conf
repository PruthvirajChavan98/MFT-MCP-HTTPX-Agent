server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # Handle SPA routing (important for /dashboard)
  location / {
    try_files $uri /index.html;
  }

  # Proxy /agent/ requests
  location /agent/ {
    proxy_pass https://agent.pruthvirajchavan.codes/agent/;

    proxy_ssl_server_name on;
    proxy_ssl_name agent.pruthvirajchavan.codes;
    proxy_ssl_protocols TLSv1.2 TLSv1.3;

    proxy_buffering off;
    proxy_cache off;
    proxy_read_timeout 3600s;
    proxy_send_timeout 3600s;

    proxy_set_header Host agent.pruthvirajchavan.codes;
    proxy_http_version 1.1;

    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "";

    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

    add_header X-Accel-Buffering no;
  }

  # Proxy /graphql requests
  location = /graphql {
    proxy_pass https://agent.pruthvirajchavan.codes/graphql;

    proxy_ssl_server_name on;
    proxy_ssl_name agent.pruthvirajchavan.codes;
    proxy_ssl_protocols TLSv1.2 TLSv1.3;

    proxy_read_timeout 60s;
    proxy_send_timeout 60s;

    proxy_set_header Host agent.pruthvirajchavan.codes;
    proxy_http_version 1.1;

    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  }

  # Proxy /eval/ requests (for dashboard)
  location /eval/ {
    proxy_pass https://agent.pruthvirajchavan.codes/eval/;

    proxy_ssl_server_name on;
    proxy_ssl_name agent.pruthvirajchavan.codes;
    proxy_ssl_protocols TLSv1.2 TLSv1.3;

    proxy_buffering off;
    proxy_cache off;
    proxy_read_timeout 120s;
    proxy_send_timeout 120s;

    proxy_set_header Host agent.pruthvirajchavan.codes;
    proxy_http_version 1.1;

    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

    add_header X-Accel-Buffering no;
  }
}
